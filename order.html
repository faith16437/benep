        <script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('billingForm');
    const buyBtn = document.getElementById('buyBtn');
    const successModal = document.getElementById('successModal');
    const errorModal = document.getElementById('errorModal');
    const continueBtn = document.getElementById('continueBtn');
    const closeErrorBtn = document.getElementById('closeErrorBtn');
    const errorText = document.getElementById('errorText');
    const newAddressForm = document.getElementById('newAddressForm');
    const existingAddressId = document.getElementById('existingAddressId');
    const saveAddressCheckbox = document.getElementById('saveAddress');
    const addressLabelDiv = document.getElementById('addressLabelDiv');

    const params = new URLSearchParams(window.location.search);
    const resumed = params.get("resume");

    async function maybeShowResumeModal() {
        if (!resumed) return;

        try {
            const res = await fetch("/api/cards/current", {
                credentials: "include"
            });
            const data = await res.json();

            if (data.success && data.order && data.order.status === "pending") {
                successModal.classList.remove("hidden");
                continueBtn.onclick = function() {
                    window.location.href = `/payment.html?order=${data.order.order_code}`;
                };
            }
        } catch (err) {
            console.error(err);
        }
    }

    maybeShowResumeModal();

    document.querySelectorAll('.address-option').forEach(option => {
        option.addEventListener('click', function() {
            document.querySelectorAll('.address-option').forEach(opt => {
                opt.classList.remove('border-primary');
                opt.classList.add('border-dark-border');
                const radioDot = opt.querySelector('.radio-indicator div');
                const radioInput = opt.querySelector('.address-radio');
                if (radioDot) radioDot.classList.add('hidden');
                if (radioInput) radioInput.checked = false;
            });

            this.classList.remove('border-dark-border');
            this.classList.add('border-primary');

            const thisDot = this.querySelector('.radio-indicator div');
            const thisRadio = this.querySelector('.address-radio');
            if (thisDot) thisDot.classList.remove('hidden');
            if (thisRadio) thisRadio.checked = true;

            if (this.dataset.newAddress) {
                newAddressForm.classList.remove('hidden');
                existingAddressId.value = '';
            } else {
                newAddressForm.classList.add('hidden');
                existingAddressId.value = this.dataset.addressId || '';
            }
        });
    });

    if (saveAddressCheckbox) {
        saveAddressCheckbox.addEventListener('change', function() {
            if (this.checked) {
                addressLabelDiv.classList.remove('hidden');
            } else {
                addressLabelDiv.classList.add('hidden');
            }
        });
    }

    buyBtn.addEventListener('click', async function(e) {
        e.preventDefault();

        const hasExistingAddresses = document.querySelectorAll('.address-option[data-address-id]').length > 0;
        if (hasExistingAddresses) {
            const selectedAddress = document.querySelector('.address-radio:checked');
            if (!selectedAddress) {
                alert('Please select an address or choose to add a new one.');
                return;
            }
        }

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        buyBtn.disabled = true;
        buyBtn.textContent = 'Processing...';

        try {
            const res = await fetch("/api/cards/create", {
                method: "POST",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ design: "purple" })
            });

            const data = await res.json();

            if (data.success && data.order) {
                successModal.classList.remove('hidden');
                continueBtn.onclick = function() {
                    window.location.href = `/payment.html?order=${data.order.order_code}`;
                };
            } else {
                errorText.textContent = data.message || 'Something went wrong.';
                errorModal.classList.remove('hidden');
            }
        } catch (error) {
            console.error('Error:', error);
            errorText.textContent = 'Network error. Please try again.';
            errorModal.classList.remove('hidden');
        } finally {
            buyBtn.disabled = false;
            buyBtn.textContent = 'Continue – Buy Card';
        }
    });

    closeErrorBtn.addEventListener('click', function() {
        errorModal.classList.add('hidden');
    });
});
</script><script>
function logoutUser() {
  fetch("/api/logout", {
    method: "POST",
    credentials: "include"
  })
    .then(res => res.json())
    .then(() => {
      localStorage.removeItem("USER_HAS_PIN");
      window.location.href = "/login.html";
    })
    .catch(err => {
      console.error("Logout failed:", err);
      window.location.href = "/login.html";
    });
}
