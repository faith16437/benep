        <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cardPreview = document.getElementById('cardPreview');
            const designOptions = document.querySelectorAll('.card-design-option');

            const cardDesigns = {
                purple: {
                    gradient: 'from-primary to-purple-800',
                    name: 'Purple'
                },
                blue: {
                    gradient: 'from-blue-600 to-blue-900',
                    name: 'Ocean'
                },
                dark: {
                    gradient: 'from-gray-700 to-gray-900',
                    name: 'Dark'
                }
            };

            let selectedDesign = 'purple';
            updateCardPreview(selectedDesign);
            updateSelectedOption(selectedDesign);

            designOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const design = this.dataset.design;
                    selectedDesign = design;
                    updateCardPreview(design);
                    updateSelectedOption(design);
                });
            });

            function updateCardPreview(design) {
                const config = cardDesigns[design];
                if (!config) return;

                const gradientClasses = [
                    'from-primary', 'to-purple-800',
                    'from-blue-600', 'to-blue-900',
                    'from-gray-700', 'to-gray-900'
                ];

                gradientClasses.forEach(cls => cardPreview.classList.remove(cls));
                cardPreview.classList.add('bg-gradient-to-br', ...config.gradient.split(' '));
            }

            function updateSelectedOption(design) {
                designOptions.forEach(option => {
                    const optionDesign = option.dataset.design;
                    const preview = option.querySelector('div');

                    if (optionDesign === design) {
                        option.classList.add('selected');
                        preview.classList.remove('border-transparent');
                        preview.classList.add('border-white', 'border-opacity-60');
                    } else {
                        option.classList.remove('selected');
                        preview.classList.remove('border-white', 'border-opacity-60');
                        preview.classList.add('border-transparent');
                    }
                });
            }

            loadCurrentCardOrder();
        });

        async function loadCurrentCardOrder() {
            try {
                const res = await fetch("/api/cards/current", {
                    credentials: "include"
                });
                const data = await res.json();

                if (!data.success || !data.order) return;

                const order = data.order;
                const ordersSection = document.getElementById("ordersSection");
                const orderCard = document.getElementById("orderCard");
                const buyCardLink = document.getElementById("buyCardLink");

                ordersSection.classList.remove("hidden");

                let statusColor = "text-primary";
                if (order.status === "cancelled") statusColor = "text-red-400";
                if (order.status === "expired") statusColor = "text-yellow-400";

                let buttons = "";
                if (order.status === "pending") {
                    buttons = `
                        <div class="flex gap-2 mt-3">
                            <a href="/payment?order=${order.order_code}" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-lg text-sm font-medium">
                                Complete Payment
                            </a>
                            <button onclick="cancelCurrentOrder()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
                                Cancel Order
                            </button>
                        </div>
                    `;
                    buyCardLink.textContent = "Complete Pending Payment";
                    buyCardLink.href = `/payment?order=${order.order_code}`;
                } else {
                    buyCardLink.textContent = "Continue – Buy Card";
                    buyCardLink.href = "/order";
                }

                orderCard.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-white font-semibold">${order.card_type}</div>
                            <div class="text-sm text-gray-400">Order #${order.order_code}</div>
                            <div class="text-sm text-gray-400">Price: $${Number(order.amount_usd).toLocaleString()}</div>
                            <div class="text-sm text-gray-400">Ordered: ${new Date(order.created_at).toDateString()}</div>
                        </div>
                        <div class="text-sm font-medium ${statusColor}">
                            ${order.status === "pending"
                                ? "Payment Pending"
                                : order.status.charAt(0).toUpperCase() + order.status.slice(1)}
                        </div>
                    </div>
                    ${buttons}
                `;
            } catch (err) {
                console.error("Failed loading card order:", err);
            }
        }

        async function cancelCurrentOrder() {
            if (!confirm("Are you sure you want to cancel this order? This action cannot be undone.")) {
                return;
            }

            try {
                const res = await fetch("/api/cards/cancel", {
                    method: "POST",
                    credentials: "include"
                });
                const data = await res.json();

                if (data.success) {
                    window.location.reload();
                } else {
                    alert(data.message || "Failed to cancel order.");
                }
            } catch (err) {
                console.error(err);
                alert("Failed to cancel order.");
            }
        }
    </script>
