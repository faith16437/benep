    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cardPreview = document.getElementById('cardPreview');
            const designOptions = document.querySelectorAll('.card-design-option');

            // Card design configurations
            const cardDesigns = {
                purple: {
                    gradient: 'from-primary to-purple-800',
                    name: 'Purple'
                },
                blue: {
                    gradient: 'from-blue-600 to-blue-900',
                    name: 'Ocean'
                },
                dark: {
                    gradient: 'from-gray-700 to-gray-900',
                    name: 'Dark'
                }
            };

            // Set default selection from server
            let selectedDesign = 'purple';
            updateCardPreview(selectedDesign);
            updateSelectedOption(selectedDesign);

            // Add click handlers to design options
            designOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const design = this.dataset.design;
                    selectedDesign = design;
                    updateCardPreview(design);
                    updateSelectedOption(design);

                    // Store preference in localStorage
                    localStorage.setItem('selectedCardDesign', design);

                    // Save preference to server
                    saveDesignPreference(design);
                });
            });

            // Load saved preference
            const savedDesign = localStorage.getItem('selectedCardDesign');
            if (savedDesign && cardDesigns[savedDesign]) {
                selectedDesign = savedDesign;
                updateCardPreview(savedDesign);
                updateSelectedOption(savedDesign);
            }

            function updateCardPreview(design) {
                const config = cardDesigns[design];
                if (!config) return;

                // Remove all existing gradient classes
                const gradientClasses = ['from-primary', 'to-purple-800', 'from-blue-600', 'to-blue-900',
                    'from-gray-700', 'to-gray-900'
                ];
                gradientClasses.forEach(cls => cardPreview.classList.remove(cls));

                // Add new gradient classes
                cardPreview.classList.add('bg-gradient-to-br', ...config.gradient.split(' '));
            }

            function updateSelectedOption(design) {
                designOptions.forEach(option => {
                    const optionDesign = option.dataset.design;
                    const preview = option.querySelector('div');

                    if (optionDesign === design) {
                        option.classList.add('selected');
                        preview.classList.remove('border-transparent');
                        preview.classList.add('border-white', 'border-opacity-60');
                    } else {
                        option.classList.remove('selected');
                        preview.classList.remove('border-white', 'border-opacity-60');
                        preview.classList.add('border-transparent');
                    }
                });
            }

            function saveDesignPreference(design) {
                fetch('https://web3ledgernetwork.com/app/cards/design-preference', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-TOKEN': 'PzHjIO31AMw6nsCZ3SmFWRL4sIN5gWlNh0M0VNI9',
                        },
                        body: JSON.stringify({
                            design: design
                        }),
                    })
                    .then(response => response.json())
                    .then(result => {
                        if (result.success) {
                            console.log('Design preference saved successfully');
                        } else {
                            console.error('Failed to save design preference:', result.message);
                        }
                    })
                    .catch(error => {
                        console.error('Error saving design preference:', error);
                    });
            }

            // Make cancelOrder function globally available
            window.cancelOrder = function(orderId) {
                if (!confirm('Are you sure you want to cancel this order? This action cannot be undone.')) {
                    return;
                }

                fetch(`/app/cards/${orderId}/cancel`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-TOKEN': 'PzHjIO31AMw6nsCZ3SmFWRL4sIN5gWlNh0M0VNI9',
                        },
                    })
                    .then(response => response.json())
                    .then(result => {
                        if (result.success) {
                            // Reload the page to show updated orders
                            window.location.reload();
                        } else {
                            alert('Error: ' + result.message);
                        }
                    })
                    .catch(error => {
                        console.error('Error cancelling order:', error);
                        alert('An error occurred while cancelling the order.');
                    });
            };
        });
    </script>
