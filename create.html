    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pinInput = document.getElementById('pin');
            const pinConfirmInput = document.getElementById('pin_confirmation');

            // Only allow numeric input
            [pinInput, pinConfirmInput].forEach(input => {
                input.addEventListener('input', function(e) {
                    // Remove any non-numeric characters
                    this.value = this.value.replace(/[^0-9]/g, '');

                    // Limit to 4 digits
                    if (this.value.length > 4) {
                        this.value = this.value.slice(0, 4);
                    }
                });

                // Prevent non-numeric key presses
                input.addEventListener('keypress', function(e) {
                    if (!/[0-9]/.test(e.key) && !['Backspace', 'Delete', 'Tab', 'Enter'].includes(e
                            .key)) {
                        e.preventDefault();
                    }
                });
            });

            // Auto-focus to confirmation when PIN is complete
            pinInput.addEventListener('input', function() {
                if (this.value.length === 4) {
                    pinConfirmInput.focus();
                }
            });
        });
    </script>
